<VirtualHost *:80>
    ServerName {{SERVER_NAME}}
    DocumentRoot "{{DOCUMENT_ROOT}}"

    <Directory "{{DOCUMENT_ROOT}}">
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "logs/{{PROJECT_SLUG}}-error_log"
    CustomLog "logs/{{PROJECT_SLUG}}-access_log" common
</VirtualHost>

